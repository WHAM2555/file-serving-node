<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Node.js File Server</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f4f8;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    header {
        background-color: #4f46e5;
        color: white;
        width: 100%;
        padding: 20px 0;
        text-align: center;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    main {
        width: 90%;
        max-width: 600px;
        margin: 30px 0;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }
    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    input[type="file"] {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    button {
        background-color: #4f46e5;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1em;
        transition: background-color 0.3s ease;
    }
    button:hover { background-color: #3730a3; }
    .files-container {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .message { margin-top: 15px; font-weight: bold; color: green; }
    .error { color: red; }
</style>
</head>
<body>
<header>
    <h1>Node.js File Server</h1>
</header>
<main>
    <h2>Upload a File</h2>
    <form id="uploadForm" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Upload</button>
    </form>
    <div class="message" id="message"></div>
    <h3>Uploaded Files</h3>
    <div class="files-container" id="filesContainer"></div>
</main>
<script>
async function loadFiles() {
    const response = await fetch('/files');
    const files = await response.json();
    const container = document.getElementById('filesContainer');
    container.innerHTML = '';
    files.forEach(file => {
        const link = document.createElement('a');
        link.href = `/uploads/${file}`;
        link.textContent = file;
        link.target = "_blank";
        container.appendChild(link);
    });
}
loadFiles();

const form = document.getElementById('uploadForm');
form.addEventListener('submit', async e => {
    e.preventDefault();
    const formData = new FormData(form);
    const response = await fetch('/upload', { method: 'POST', body: formData });
    const msg = document.getElementById('message');
    if (response.ok) {
        msg.textContent = await response.text();
        msg.classList.remove('error');
        loadFiles();
    } else {
        msg.textContent = await response.text();
        msg.classList.add('error');
    }
    form.reset();
});
</script>
</body>
</html>
